# =============================================================================
# Secret — Sensitive configuration values
# =============================================================================
# IMPORTANT: This file contains PLACEHOLDER values. Before deploying:
#
#   1. Replace placeholder values with real ones
#   2. Generate base64-encoded values:
#        echo -n 'your-secret-key' | base64
#        echo -n 'file:./prisma/prod.db' | base64
#   3. OR use kubectl to create the secret directly:
#        kubectl create secret generic enade-quiz-secrets \
#          --from-literal=ADMIN_SECRET_KEY=your-secret-key \
#          --from-literal=DATABASE_URL=file:./prisma/prod.db \
#          -n enade-quiz
#   4. NEVER commit real secrets to version control
#
# For production, consider using:
#   - Sealed Secrets (bitnami-labs/sealed-secrets)
#   - External Secrets Operator (syncing from Vault/AWS SM/GCP SM)
#   - SOPS (Mozilla's secrets encryption tool)
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: enade-quiz-secrets
  namespace: enade-quiz
  labels:
    app: enade-quiz
type: Opaque
data:
  # Admin password for the /admin page — base64 encoded
  # Replace with: echo -n 'YOUR_REAL_SECRET_KEY' | base64
  ADMIN_SECRET_KEY: UExBQ0VIT0xERVJfUkVQTEFDRV9XSVRIX1JFQUxfU0VDUkVU

  # SQLite connection string for Prisma — base64 encoded
  # In production the DB file lives on the persistent volume at /app/prisma/prod.db
  # Replace with: echo -n 'file:./prisma/prod.db' | base64
  DATABASE_URL: ZmlsZTouL3ByaXNtYS9wcm9kLmRi
