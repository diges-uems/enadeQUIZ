name: CI

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and Type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Generate Prisma Client
        run: bunx prisma generate
      - name: Lint
        run: bun run lint
        continue-on-error: true
      - name: Type-check
        run: bunx tsc --noEmit
        continue-on-error: true

  build:
    name: Production Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Generate Prisma Client
        run: bunx prisma generate
      - name: Build production
        env:
          DATABASE_URL: file:./db/custom.db
          ADMIN_SECRET_KEY: enade2024
          PRESENTER_KEY: presenter-default-key-2025
          NEXT_TELEMETRY_DISABLED: "1"
        run: bun run build
      - name: Smoke test production server
        env:
          DATABASE_URL: file:./db/custom.db
          ADMIN_SECRET_KEY: enade2024
          PRESENTER_KEY: presenter-default-key-2025
          PORT: "3000"
        run: |
          bun run start &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health > /dev/null; then
              echo "Server is ready"
              break
            fi
            sleep 1
          done
          echo "-- GET / --"
          curl -sS -o /dev/null -w "Status: %{http_code}\n" http://localhost:3000/
          echo "-- GET /api/health --"
          curl -sS http://localhost:3000/api/health
          echo ""
          echo "-- GET /api/session --"
          curl -sS -o /dev/null -w "Status: %{http_code}\n" http://localhost:3000/api/session
          echo "-- GET /admin --"
          curl -sS -o /dev/null -w "Status: %{http_code}\n" http://localhost:3000/admin
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true
      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: |
            .next/
            db/custom.db
          retention-days: 7

  build-offline:
    name: Build Offline Z.ai simulation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Generate Prisma Client
        run: bunx prisma generate
      - name: Build with no network access
        env:
          DATABASE_URL: file:./db/custom.db
          ADMIN_SECRET_KEY: enade2024
          PRESENTER_KEY: presenter-default-key-2025
          NEXT_TELEMETRY_DISABLED: "1"
          http_proxy: http://127.0.0.1:1
          https_proxy: http://127.0.0.1:1
          HTTP_PROXY: http://127.0.0.1:1
          HTTPS_PROXY: http://127.0.0.1:1
          NO_PROXY: ""
          no_proxy: ""
        run: bun run build
